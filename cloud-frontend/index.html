<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebMotor Cloud Control</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>☁️ WebMotor Cloud Control</h1>
        
        <!-- Cloud Configuration Card -->
        <div class="control-card">
            <h2>Cloud Configuration</h2>
            
            <div class="control-group">
                <label for="api-key">API Key:</label>
                <input type="password" id="api-key" placeholder="Enter API Key">
            </div>

            <button id="save-config" class="btn btn-primary">Save Configuration</button>
            <button id="test-connection" class="btn btn-secondary">Test Connection</button>
        </div>

        <!-- Status Bar -->
        <div class="control-card">
            <div class="status-bar">
                <div class="status-item">
                    <span class="status-label">Cloud:</span>
                    <span id="connection-status" class="status-indicator disconnected">Disconnected</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Motor:</span>
                    <span id="motor-status" class="motor-status unknown">Unknown</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Position:</span>
                    <span id="position-value" class="value-display">-</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Last Update:</span>
                    <span id="last-update" class="value-display">Never</span>
                </div>
            </div>
        </div>
        
        <!-- Motor Control Card -->
        <div class="control-card">
            <h2>Motor Control</h2>
            
            <div class="control-group">
                <label for="microsteps">Microstepping:</label>
                <select id="microsteps">
                    <option value="1">Full Step (1/1)</option>
                    <option value="2">Half Step (1/2)</option>
                    <option value="4">Quarter Step (1/4)</option>
                    <option value="8">Eighth Step (1/8)</option>
                    <option value="16">Sixteenth Step (1/16)</option>
                </select>
            </div>

            <div class="control-group">
                <label for="frequency">Frequency (Hz):</label>
                <div class="frequency-container">
                    <input type="range" id="frequency" min="0" max="10000" value="100" step="10">
                    <div class="frequency-display">
                        <span id="frequency-value">100</span>
                    </div>
                </div>
            </div>

            <div class="control-group">
                <label>Direction:</label>
                <div class="toggle-container">
                    <input type="checkbox" id="direction" class="toggle-input">
                    <label for="direction" class="toggle-switch"></label>
                    <span class="toggle-text" id="direction-text">CCW</span>
                </div>
            </div>

            <div class="control-group">
                <label>Mode:</label>
                <div class="mode-buttons">
                    <button id="start" class="btn btn-primary">Start</button>
                    <button id="stop" class="btn btn-secondary">Stop</button>
                    <button id="release" class="btn btn-info">Release</button>
                </div>
            </div>
        </div>

        <!-- Status Log -->
        <div class="status">
            <h2>Status</h2>
            <pre id="status-output">Ready... Configure cloud settings above to begin.</pre>
        </div>

        <!-- Version Info -->
        <div class="version-info" id="version-info">
            <small>Loading version...</small>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
