[env:esp32_pico_kit]
platform = espressif32
board = pico32
framework = arduino

monitor_speed = 115200

; Pre-build script to generate version info
extra_scripts = pre:generate_version.py

; Data directory configuration for SPIFFS upload
data_dir = data

; SPIFFS configuration
board_build.filesystem = spiffs
board_build.partitions = default.csv

lib_deps =
    bblanchon/ArduinoJson @ ^7.1.0

build_flags =
    -D WIFI_SSID="your_wifi_ssid"
    -D WIFI_PASSWORD="your_wifi_password"
    -D MDNS_NAME="webmotor"

; Optional: Uncomment to explicitly set upload/monitor port
; upload_port = /dev/cu.usbmodemXYZ
; monitor_port = /dev/cu.usbmodemXYZ
