<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebMotor Control</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>WebMotor Control</h1>
        
        <div class="control-panel">
            <div class="control-group">
                <h2>Motor Control</h2>
                <div class="control-row">
                    <label for="microsteps">Microstepping:</label>
                    <select id="microsteps">
                        <option value="1">Full Step (1/1)</option>
                        <option value="2">Half Step (1/2)</option>
                        <option value="4">Quarter Step (1/4)</option>
                        <option value="8">Eighth Step (1/8)</option>
                        <option value="16">Sixteenth Step (1/16)</option>
                    </select>
                </div>
                
                <div class="control-row">
                    <label for="frequency">Frequency (Hz):</label>
                    <input type="number" id="frequency" min="0" max="10000" step="1" value="0">
                </div>
                
                <div class="control-row">
                    <label for="direction">Direction:</label>
                    <div class="toggle-switch">
                        <input type="checkbox" id="direction">
                        <label for="direction" class="toggle-label"></label>
                        <span class="direction-label">CCW</span>
                        <span class="direction-label">CW</span>
                    </div>
                </div>
                
                <div class="control-row">
                    <label>Mode:</label>
                    <div class="button-group">
                        <button id="btn-start" class="control-button">Start</button>
                        <button id="btn-stop" class="control-button">Stop</button>
                        <button id="btn-release" class="control-button">Release</button>
                    </div>
                </div>
            </div>

            <div class="control-group">
                <h2>WiFi Configuration</h2>
                <div class="control-row">
                    <label for="wifi-ssid">SSID:</label>
                    <input type="text" id="wifi-ssid">
                </div>
                
                <div class="control-row">
                    <label for="wifi-password">Password:</label>
                    <input type="password" id="wifi-password">
                </div>
                
                <div class="control-row">
                    <button id="btn-wifi-save" class="control-button">Save WiFi Config</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
