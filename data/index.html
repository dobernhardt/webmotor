<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebMotor Control (lokal)</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>WebMotor Control (lokal)</h1>

        <div class="control-card">
            <div class="status-bar">
                <div class="status-item">
                    <span class="status-label">Verbindung:</span>
                    <span id="connection-status" class="status-indicator disconnected">Getrennt</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Fahren:</span>
                    <span id="drive-status" class="motor-status unknown">-</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Lenkung:</span>
                    <span id="steering-value" class="network-info">-</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Netzwerk:</span>
                    <span id="network-info" class="network-info">-</span>
                </div>
            </div>
        </div>

        <div class="control-card">
            <h2>🕹️ Fahren (Test)</h2>

            <div class="joystick-area">
                <div id="joystick" class="joystick-base">
                    <div id="joystick-knob" class="joystick-knob"></div>
                </div>
            </div>

            <div class="control-group">
                <div class="joystick-values">
                    X (Lenkung): <span id="joy-x">0.00</span> |
                    Y (Gas): <span id="joy-y">0.00</span>
                </div>
            </div>

            <button id="stop" class="btn btn-danger">NOT-AUS</button>
        </div>

        <div class="control-card">
            <h2>Fahrwerk</h2>

            <div class="control-group">
                <label for="steer-limit">Lenk-Limit (&plusmn;&deg;):</label>
                <div class="frequency-container">
                    <input type="range" id="steer-limit" min="5" max="180" value="45" step="5">
                    <div class="frequency-display">
                        <span id="steer-limit-value">45</span>&deg;
                    </div>
                </div>
            </div>

            <div class="control-group">
                <label for="max-speed">Max. Geschwindigkeit (Schritte/s):</label>
                <div class="frequency-container">
                    <input type="range" id="max-speed" min="50" max="1000" value="600" step="50">
                    <div class="frequency-display">
                        <span id="max-speed-value">600</span>
                    </div>
                </div>
            </div>

            <div class="control-group">
                <button id="save-drive-config" class="btn btn-primary">Speichern</button>
                <button id="center-steering" class="btn btn-secondary">Lenkung zentrieren</button>
            </div>
        </div>

        <div class="control-card">
            <h2>Cloud Configuration</h2>

            <div class="control-group">
                <label for="cloud-endpoint">Azure Function Endpoint:</label>
                <input type="text" id="cloud-endpoint" placeholder="https://your-function-app.azurewebsites.net/api">
            </div>

            <div class="control-group">
                <label for="cloud-api-key">API Key:</label>
                <input type="password" id="cloud-api-key" placeholder="Enter API Key">
            </div>

            <div class="control-group">
                <label>Enable Cloud Sync:</label>
                <div class="toggle-container">
                    <input type="checkbox" id="cloud-enabled" class="toggle-input">
                    <label for="cloud-enabled" class="toggle-switch"></label>
                    <span class="toggle-text" id="cloud-enabled-text">Disabled</span>
                </div>
            </div>

            <div class="control-group">
                <button id="save-cloud" class="btn btn-primary">Save Cloud Config</button>
                <button id="test-cloud" class="btn btn-secondary">Test Connection</button>
            </div>
        </div>

        <div class="control-card">
            <h2>WiFi Configuration</h2>

            <div class="control-group">
                <label for="ssid">SSID:</label>
                <input type="text" id="ssid" placeholder="Enter SSID">
            </div>

            <div class="control-group">
                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="Enter Password">
            </div>

            <button id="save-wifi" class="btn btn-primary">Save WiFi Config</button>
        </div>

        <div class="status">
            <h2>Status</h2>
            <pre id="status-output">Bereit...</pre>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
