mode: ContinuousDeployment
next-version: 0.1.0
branches:
  main:
    regex: ^main$
    tag: ''
    increment: Patch
  add_cloud:
    regex: ^add[_-]cloud$
    tag: beta
    increment: Minor
  feature:
    regex: ^features?[/-]
    tag: alpha
    increment: Minor
  pull-request:
    regex: ^(pull|pull\-requests|pr)[/-]
    tag: pr
    increment: Inherit
