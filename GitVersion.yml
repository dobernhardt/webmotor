mode: ContinuousDeployment
next-version: 0.1.0
branches:
  main:
    regex: ^main$
    label: ''
    increment: Patch
  add_cloud:
    regex: ^add[_-]cloud$
    label: beta
    increment: Minor
  feature:
    regex: ^features?[/-]
    label: alpha
    increment: Minor
  pull-request:
    regex: ^(pull|pull\-requests|pr)[/-]
    label: pr
    increment: Inherit
